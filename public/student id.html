<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTU | የክሊራንስ መከታተያ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <div style="text-align: center; margin-bottom: 25px; padding: 15px; background-color: #f8f9fa; border-radius: 10px;">
    <img src="mtu_logo.png" alt="Mizan-Tepi University Logo" style="width: 140px; height: auto;">
    <h1 style="color: #1a5276; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">ሚዛን-ቴፒ ዩኒቨርሲቲ</h1>
    <p style="color: #555; font-weight: bold;">የተማሪዎች ክሊራንስ መቆጣጠሪያ ሲስተም</p>
</div>
        
        <div class="form-group">
            <label for="studentID">መታወቂያ ቁጥር</label>
            <input type="text" id="studentID" placeholder="write your id " required>
            <button id="checkBtn">ሁኔታውን አረጋግጥ</button>
        </div>

        <div id="resultArea" class="result-hidden">
            </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
