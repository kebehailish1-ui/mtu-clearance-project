<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTU | የክሊራንስ መከታተያ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <div class="header">
            <img src="mtu_logo.png" alt="Mizan-Tepi University" style="width:120px; display:block; margin:auto;">
            <h2 style="color:green;"><b>ሚዛን ቴፒ ዩኒቨርሲቲ</b></h2>
            <p><b>Smart Clearance System</b></p>
        </div>
        
        <div class="form-group">
            <label for="studentID">መታወቂያ ቁጥር</label>
            <input type="text" id="studentID" placeholder="write your id " required>
            <button id="checkBtn">ሁኔታውን አረጋግጥ</button>
        </div>

        <div id="resultArea" class="result-hidden">
            </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
