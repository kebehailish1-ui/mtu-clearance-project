<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <title>የአስተዳዳሪ ገጽ (Admin Panel)</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .box { border: 1px solid #ccc; padding: 20px; margin: 10px; border-radius: 8px; }
        button { cursor: pointer; padding: 10px; margin-top: 5px; width: 100%; }
        .btn-add { background: #2ecc71; color: white; border: none; }
        .btn-clear { background: #3498db; color: white; border: none; }
    </style>
</head>
<body>
    <div class="container">
        <h2>የክሊራንስ መቆጣጠሪያ (Admin)</h2>

        <div class="box">
            <h3>1. አዲስ ተማሪ መመዝገቢያ</h3>
            <input type="text" id="regId" placeholder="መታወቂያ (ID)">
            <input type="text" id="regName" placeholder="ሙሉ ስም">
            <button class="btn-add" onclick="register()">ወደ SQL መዝግብ</button>
        </div>

        <div class="box">
            <h3>2. የዕዳ ሁኔታ ማጽጃ (Clearance)</h3>
            <input type="text" id="clearId" placeholder="የተማሪ መታወቂያ (ID)">
            <button class="btn-clear" onclick="clearStatus()">ዕዳውን አጽድቅ (Clear)</button>
        </div>
        
        <p id="resultMsg" style="text-align: center; font-weight: bold;"></p>
    </div>

    <script>
        // ተማሪ መመዝገቢያ
        async function register() {
            const id = document.getElementById('regId').value;
            const name = document.getElementById('regName').value;
            const res = await fetch('http://127.0.0.1:3000/add_student', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({id, name})
            });
            const data = await res.json();
            document.getElementById('resultMsg').innerText = data.message || data.error;
        }

        // ዕዳ ማጽጃ
        async function clearStatus() {
            const id = document.getElementById('clearId').value;
            const res = await fetch('http://127.0.0.1:3000/update_status', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({id})
            });
            const data = await res.json();
            document.getElementById('resultMsg').innerText = data.message || data.error;
        }
    </script>
</body>
</html>
